name: 20 - App Secrets Sync (per-app)

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment (develop|prod). Leave blank for auto"
        type: string
        required: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: app-secrets-sync-${{ github.ref_name }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'web-apps' }}
  APP_RAW: ${{ vars.APP || github.event.repository.name }}
  PUBLIC_ENV_JSON: ${{ vars.PUBLIC_ENV_JSON || '' }}
  RUNTIME_SECURE_JSON: ${{ secrets.RUNTIME_SECURE_JSON || '' }}
  ACME_EMAIL: ${{ vars.ACME_EMAIL || '' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  app_secrets_sync:
    name: "🔐 Sync app env"
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.envsel.outputs.env_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade pip boto3
      - name: Verify scripts folder
        run: |
          set -e
          test -d scripts || { echo "::error::Missing scripts/"; exit 1; }
          ls -la scripts
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Decide environment (develop vs prod)
        id: envsel
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.env_name || '' }}" ]; then
            ENV_NAME="${{ inputs.env_name }}"
          else
            case "${GITHUB_REF_NAME}" in
              main)        ENV_NAME="prod"    ;;
              develop|dev) ENV_NAME="develop" ;;
              *)           ENV_NAME="develop" ;;
            esac
          fi
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "Using env: $ENV_NAME"

      - name: Sync env to SSM
        working-directory: ./scripts
        env:
          PUBLIC_ENV_JSON: ${{ env.PUBLIC_ENV_JSON || '' }}
          RUNTIME_SECURE_JSON: ${{ env.RUNTIME_SECURE_JSON || '' }}
        run: python env_sync.py --env "${{ steps.envsel.outputs.env_name }}" --app "auto"

      - name: Ensure DB (via SSM)
        working-directory: ./scripts
        run: python ensure_db.py --env "${{ steps.envsel.outputs.env_name }}" --app "auto" --run-migrations

  invoke_render:
    name: "🔁 Invoke Render Doc"
    needs: [app_secrets_sync]
    uses: ./.github/workflows/30-render-invoke.yml
    with:
      env_name: ${{ needs.app_secrets_sync.outputs.env_name }}
      region: ${{ vars.AWS_REGION || 'us-east-1' }}
      acme_email: ${{ vars.ACME_EMAIL || '' }}
    secrets: inherit

  notify_failure:
    uses: ./.github/workflows/31-notify.yml
    with:
      env_name: ${{ needs.app_secrets_sync.outputs.env_name || 'develop' }}
      region: ${{ vars.AWS_REGION || 'us-east-1' }}   # ⬅️ add
      app: ${{ vars.APP || github.event.repository.name }}
      status: failure                                  # ⬅️ add
      slack_message: "App secrets sync FAILED (run ${{ github.run_id }})"
      slack_mention: "here"
      email_subject: "App secrets sync FAILED"
      email_body: "Run ${{ github.run_id }}"
    secrets: inherit

  notify_success:
    uses: ./.github/workflows/31-notify.yml
    with:
      env_name: ${{ needs.app_secrets_sync.outputs.env_name }}
      region: ${{ vars.AWS_REGION || 'us-east-1' }}   # ⬅️ add
      app: ${{ vars.APP || github.event.repository.name }}
      status: success                                  # ⬅️ add
      slack_message: "App secrets sync SUCCEEDED (run ${{ github.run_id }})"
      email_subject: "App secrets sync SUCCEEDED"
      email_body: "Run ${{ github.run_id }}"
    secrets: inherit


name: 30 - Invoke Render Doc (reusable)

on:
  workflow_call:
    inputs:
      env_name:
        type: string
        required: false
        default: ""
      region:
        type: string
        required: false
        default: ""
      acme_email:
        type: string
        required: false
        default: ""
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      id-token: write
    steps:
      - name: Ensure jq
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Authenticate to AWS via OIDC
        shell: bash
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          AWS_REGION_INPUT: ${{ inputs.region != '' && inputs.region || vars.AWS_REGION || 'us-east-1' }}
        run: |
          set -euo pipefail
          REGION="${AWS_REGION_INPUT:-us-east-1}"
          [ -n "${AWS_ROLE_ARN:-}" ] || { echo "::error::AWS_ROLE_ARN missing"; exit 1; }

          OIDC_TOKEN="$(python3 - <<'PY'
          import json, os, urllib.parse, urllib.request
          url = os.environ["ACTIONS_ID_TOKEN_REQUEST_URL"] + "&audience=" + urllib.parse.quote("sts.amazonaws.com", safe="")
          req = urllib.request.Request(url, headers={"Authorization": f"bearer {os.environ['ACTIONS_ID_TOKEN_REQUEST_TOKEN']}"})
          with urllib.request.urlopen(req) as resp:
              print(json.load(resp)["value"])
          PY
          )"

          CREDS_JSON="$(aws sts assume-role-with-web-identity \
            --no-sign-request \
            --role-arn "$AWS_ROLE_ARN" \
            --role-session-name "GitHubActions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --web-identity-token "$OIDC_TOKEN" \
            --duration-seconds 3600 \
            --query 'Credentials' \
            --output json)"

          mapfile -t AWS_CREDS < <(AWS_CREDS_JSON="$CREDS_JSON" python3 - <<'PY'
          import json, os
          creds = json.loads(os.environ["AWS_CREDS_JSON"])
          print(creds["AccessKeyId"])
          print(creds["SecretAccessKey"])
          print(creds["SessionToken"])
          PY
          )

          echo "::add-mask::${AWS_CREDS[0]}"
          echo "::add-mask::${AWS_CREDS[1]}"
          echo "::add-mask::${AWS_CREDS[2]}"

          export AWS_ACCESS_KEY_ID="${AWS_CREDS[0]}"
          export AWS_SECRET_ACCESS_KEY="${AWS_CREDS[1]}"
          export AWS_SESSION_TOKEN="${AWS_CREDS[2]}"
          export AWS_REGION="$REGION"
          export AWS_DEFAULT_REGION="$REGION"

          {
            echo "AWS_ACCESS_KEY_ID=${AWS_CREDS[0]}"
            echo "AWS_SECRET_ACCESS_KEY=${AWS_CREDS[1]}"
            echo "AWS_SESSION_TOKEN=${AWS_CREDS[2]}"
            echo "AWS_REGION=$REGION"
            echo "AWS_DEFAULT_REGION=$REGION"
          } >> "$GITHUB_ENV"

          aws sts get-caller-identity >/dev/null

      - name: Invoke render via SSM
        shell: bash
        env:
          IN_ENV_NAME: ${{ inputs.env_name }}
          IN_REGION: ${{ inputs.region }}
          IN_ACME_EMAIL: ${{ inputs.acme_email }}
        run: |
          set -Eeuo pipefail

          poll_ssm_command() {
            local cmd_id="$1"
            local ec2_id="$2"
            local label="$3"
            local attempts="${4:-60}"
            local sleep_seconds="${5:-5}"
            local status=""

            for attempt in $(seq 1 "$attempts"); do
              status="$(aws ssm get-command-invocation \
                --command-id "$cmd_id" \
                --instance-id "$ec2_id" \
                --query 'Status' \
                --output text 2>/dev/null || true)"

              echo "${label} status (${attempt}/${attempts}): ${status:-<none>}"

              case "$status" in
                Success) return 0 ;;
                Failed|Cancelled|TimedOut)
                  echo "::error::${label} status=${status}"
                  aws ssm get-command-invocation \
                    --command-id "$cmd_id" \
                    --instance-id "$ec2_id" \
                    --output text || true
                  return 1
                  ;;
              esac

              sleep "$sleep_seconds"
            done

            echo "::error::${label} timed out after ${attempts} attempts"
            aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "$ec2_id" \
              --output text || true
            return 1
          }

          # Resolve env
          ENV_NAME="${IN_ENV_NAME}"
          if [ -z "$ENV_NAME" ]; then
            case "${GITHUB_REF_NAME}" in
              main) ENV_NAME="prod" ;;
              develop|dev) ENV_NAME="develop" ;;
              *) ENV_NAME="develop" ;;
            esac
          fi

          # Resolve region
          REGION="${IN_REGION:-${AWS_REGION:-}}"
          [ -n "$REGION" ] || REGION="us-east-1"
          echo "Using env=${ENV_NAME} region=${REGION}"

          BASE="/infra/${ENV_NAME}/ci"
          RENDER_DOC="$(aws ssm get-parameter --name "${BASE}/ssm_render_doc" --query 'Parameter.Value' --output text 2>/dev/null || true)"
          EC2_ID="$(aws ssm get-parameter --name "${BASE}/ec2_instance_id" --query 'Parameter.Value' --output text 2>/dev/null || true)"

          [ -n "$RENDER_DOC" ] || { echo "::error::Missing ${BASE}/ssm_render_doc"; exit 1; }
          [ -n "$EC2_ID" ]    || { echo "::error::Missing ${BASE}/ec2_instance_id"; exit 1; }

          PARAMS="$(jq -n --arg env "$ENV_NAME" --arg reg "$REGION" --arg email "${IN_ACME_EMAIL:-}" \
                     '{EnvName:[$env],Region:[$reg],AcmeEmail:[$email]}')"

          echo "Invoking SSM document: $RENDER_DOC on EC2: $EC2_ID"
          echo "Parameters: $PARAMS"

          CMD_ID="$(aws ssm send-command \
            --document-name "$RENDER_DOC" \
            --instance-ids "$EC2_ID" \
            --parameters "$PARAMS" \
            --comment "render-invoke: ${GITHUB_REPOSITORY}@${GITHUB_SHA}" \
            --query 'Command.CommandId' \
            --output text)"

          echo "render_cmd_id=$CMD_ID"
          poll_ssm_command "$CMD_ID" "$EC2_ID" "render" 60 5

          echo "Final SSM invocation output:"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_ID" \
            --output text || true

          echo "Render succeeded. Pruning UNUSED Docker artifacts on host..."

          CLEANUP_COMMANDS="$(jq -nc '[
            "set -euo pipefail",
            "echo \"[cleanup] Before:\"",
            "docker system df || true",
            "df -h || true",
            "docker container prune -f || true",
            "docker image prune -af || true",
            "docker builder prune -af || true",
            "echo \"[cleanup] After:\"",
            "docker system df || true",
            "df -h || true"
          ]')"

          CLEANUP_CMD_ID="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$EC2_ID" \
            --parameters "{\"commands\": ${CLEANUP_COMMANDS}}" \
            --comment "post-render docker cleanup: ${GITHUB_REPOSITORY}@${GITHUB_SHA}" \
            --query 'Command.CommandId' \
            --output text)"

          echo "cleanup_cmd_id=$CLEANUP_CMD_ID"
          poll_ssm_command "$CLEANUP_CMD_ID" "$EC2_ID" "cleanup" 60 5

          echo "Final cleanup output:"
          aws ssm get-command-invocation \
            --command-id "$CLEANUP_CMD_ID" \
            --instance-id "$EC2_ID" \
            --output text || true

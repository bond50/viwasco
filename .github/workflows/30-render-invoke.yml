name: 30 - Invoke Render Doc (reusable)

on:
  workflow_call:
    inputs:
      env_name: { type: string, required: false, default: "" }
      region: { type: string, required: false, default: "" }
      acme_email: { type: string, required: false, default: "" }

permissions:
  id-token: write
  contents: read

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure jq
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y jq
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region != '' && inputs.region || vars.AWS_REGION || 'us-east-1' }}

      - name: Invoke render via SSM
        shell: bash
        env:
          IN_ENV_NAME: ${{ inputs.env_name }}
          IN_REGION: ${{ inputs.region }}
          IN_ACME_EMAIL: ${{ inputs.acme_email }}
        run: |
          set -Eeuo pipefail

          # Env
          ENV_NAME="${IN_ENV_NAME}"
          if [ -z "$ENV_NAME" ]; then
            case "${GITHUB_REF_NAME}" in
              main) ENV_NAME="prod" ;;
              develop|dev) ENV_NAME="develop" ;;
              *) ENV_NAME="develop" ;;
            esac
          fi

          # Region
          REGION="${IN_REGION:-${AWS_REGION:-}}"
          [ -n "$REGION" ] || REGION="us-east-1"
          echo "Using env=${ENV_NAME} region=${REGION}"

          BASE="/infra/${ENV_NAME}/ci"
          RENDER_DOC="$(aws ssm get-parameter --name "${BASE}/ssm_render_doc" --query 'Parameter.Value' --output text 2>/dev/null || true)"
          EC2_ID="$(aws ssm get-parameter --name "${BASE}/ec2_instance_id" --query 'Parameter.Value' --output text 2>/dev/null || true)"
          [ -n "$RENDER_DOC" ] || { echo "::error::Missing ${BASE}/ssm_render_doc"; exit 1; }
          [ -n "$EC2_ID" ]    || { echo "::error::Missing ${BASE}/ec2_instance_id"; exit 1; }

          echo "Waiting for SSM-managed instance: ${EC2_ID}"
          READY=0
          for _ in $(seq 1 60); do
            PING_STATUS="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${EC2_ID}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)"
            if [ "$PING_STATUS" = "Online" ]; then
              READY=1
              break
            fi
            sleep 5
          done

          if [ "$READY" != "1" ]; then
            echo "::error::Instance ${EC2_ID} is not online in SSM for ${REGION}"
            aws ec2 describe-instances \
              --instance-ids "$EC2_ID" \
              --query 'Reservations[].Instances[].{InstanceId:InstanceId,State:State.Name,LaunchTime:LaunchTime,SubnetId:SubnetId,PrivateIp:PrivateIpAddress}' \
              --output table || true
            aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${EC2_ID}" \
              --query 'InstanceInformationList[].{InstanceId:InstanceId,PingStatus:PingStatus,LastPingDateTime:LastPingDateTime,PlatformName:PlatformName,PlatformVersion:PlatformVersion,AgentVersion:AgentVersion}' \
              --output table || true
            exit 1
          fi

          PREFLIGHT_CMD_ID="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$EC2_ID" \
            --parameters '{"commands":["bash -lc '\''set -Eeuo pipefail; for _ in $(seq 1 90); do if [ -f /root/bootstrap/.bootstrap_ok ]; then uname -a; echo ssm_preflight_ok; exit 0; fi; sleep 5; done; echo bootstrap_not_ready; exit 1'\''"]}' \
            --comment "render-preflight: ${GITHUB_REPOSITORY}@${GITHUB_SHA}" \
            --query 'Command.CommandId' --output text)"
          echo "preflight_cmd_id=$PREFLIGHT_CMD_ID"

          PREFLIGHT_DONE=0
          for _ in $(seq 1 120); do
            PREFLIGHT_STATUS="$(aws ssm get-command-invocation --command-id "$PREFLIGHT_CMD_ID" --instance-id "$EC2_ID" --query 'Status' --output text 2>/dev/null || true)"
            PREFLIGHT_DETAILS="$(aws ssm get-command-invocation --command-id "$PREFLIGHT_CMD_ID" --instance-id "$EC2_ID" --query 'StatusDetails' --output text 2>/dev/null || true)"
            case "$PREFLIGHT_STATUS:$PREFLIGHT_DETAILS" in
              Success:*)
                PREFLIGHT_DONE=1
                break
                ;;
              Failed:*|Cancelled:*|TimedOut:*|DeliveryTimedOut:*|Undeliverable:*|InvalidPlatform:*|AccessDenied:*)
                echo "::error::preflight status=${PREFLIGHT_STATUS} details=${PREFLIGHT_DETAILS}"
                aws ssm get-command-invocation --command-id "$PREFLIGHT_CMD_ID" --instance-id "$EC2_ID" --output text || true
                aws ssm describe-instance-information \
                  --filters "Key=InstanceIds,Values=${EC2_ID}" \
                  --query 'InstanceInformationList[].{InstanceId:InstanceId,PingStatus:PingStatus,LastPingDateTime:LastPingDateTime,PlatformName:PlatformName,PlatformVersion:PlatformVersion,AgentVersion:AgentVersion}' \
                  --output table || true
                exit 1
                ;;
            esac
            sleep 5
          done

          if [ "$PREFLIGHT_DONE" != "1" ]; then
            echo "::error::preflight did not reach Success within timeout"
            aws ssm get-command-invocation --command-id "$PREFLIGHT_CMD_ID" --instance-id "$EC2_ID" --output text || true
            exit 1
          fi

          PARAMS="$(jq -n --arg env "$ENV_NAME" --arg reg "$REGION" --arg email "${IN_ACME_EMAIL:-}" \
                     '{EnvName:[$env],Region:[$reg],AcmeEmail:[$email]}')"

          CMD_ID="$(aws ssm send-command \
            --document-name "$RENDER_DOC" \
            --instance-ids "$EC2_ID" \
            --parameters "$PARAMS" \
            --comment "render-invoke: ${GITHUB_REPOSITORY}@${GITHUB_SHA}" \
            --query 'Command.CommandId' --output text)"
          echo "render_cmd_id=$CMD_ID"

          DONE=0
          for _ in $(seq 1 60); do
            STATUS="$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$EC2_ID" --query 'Status' --output text 2>/dev/null || true)"
            STATUS_DETAILS="$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$EC2_ID" --query 'StatusDetails' --output text 2>/dev/null || true)"
            case "$STATUS:$STATUS_DETAILS" in
              Success:*)
                DONE=1
                break
                ;;
              Failed:*|Cancelled:*|TimedOut:*|DeliveryTimedOut:*|Undeliverable:*|InvalidPlatform:*|AccessDenied:*)
                echo "::error::render status=${STATUS} details=${STATUS_DETAILS}"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$EC2_ID" --output text || true
                exit 1
                ;;
            esac
            sleep 5
          done

          if [ "$DONE" != "1" ]; then
            echo "::error::render status did not reach Success within timeout"
            aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$EC2_ID" --output text || true
            exit 1
          fi

          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$EC2_ID" --output text || true
